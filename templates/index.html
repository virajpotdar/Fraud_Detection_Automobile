<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Automobile Insurance Fraud Detection System</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Segoe+UI:wght@400;600&display=swap" rel="stylesheet">
</head>

<body>
    <div class="container">
        <header>
            <h1>Automobile Insurance Fraud Detection System</h1>
        </header>

        <div class="form-container">
            <h2>Submit Claim Details for Verification</h2>
            <form action="/" method="POST">

                <div class="form-group">
                    <label for="age">Customer Age:</label>
                    <input type="number" id="age" name="age" required placeholder="e.g. 35">
                </div>

                <div class="form-group">
                    <label for="months_as_customer">Months as Customer:</label>
                    <input type="number" id="months_as_customer" name="months_as_customer" required
                        placeholder="e.g. 120">
                </div>

                <div class="form-group">
                    <label for="annual_premium">Annual Premium (₹):</label>
                    <input type="number" step="0.01" id="annual_premium" name="annual_premium" required
                        placeholder="e.g. 1200.50">
                </div>

                <div class="form-group">
                    <label for="total_claim_amount">Total Claim Amount (₹):</label>
                    <input type="number" step="0.01" id="total_claim_amount" name="total_claim_amount" required
                        placeholder="e.g. 50000">
                </div>

                <div class="form-group">
                    <label for="vehicles">Number of Vehicles Involved:</label>
                    <input type="number" id="vehicles" name="vehicles" required placeholder="e.g. 2">
                </div>

                <div class="form-group">
                    <label for="witnesses">Witnesses:</label>
                    <input type="number" id="witnesses" name="witnesses" required placeholder="e.g. 1">
                </div>

                <div class="form-group">
                    <label for="injury_claim">Injury Claim Amount (₹):</label>
                    <input type="number" step="0.01" id="injury_claim" name="injury_claim" required
                        placeholder="e.g. 15000">
                </div>

                <div class="form-group">
                    <label for="property_claim">Property Claim Amount (₹):</label>
                    <input type="number" step="0.01" id="property_claim" name="property_claim" required
                        placeholder="e.g. 10000">
                </div>

                <div class="form-group">
                    <label for="vehicle_claim">Vehicle Claim Amount (₹):</label>
                    <input type="number" step="0.01" id="vehicle_claim" name="vehicle_claim" required
                        placeholder="e.g. 25000">
                </div>

                <div class="form-group">
                    <label for="incident_hour">Incident Hour (0-23):</label>
                    <input type="number" id="incident_hour" name="incident_hour" required min="0" max="23"
                        placeholder="e.g. 14">
                </div>

                <div class="submit-btn-container">
                    <button type="submit" class="predict-btn">Predict Fraud Label</button>
                </div>
            </form>
        </div>

        {% if prediction_text %}
        <div class="result-container {{ result_class }}">
            <h3>Prediction Result:</h3>
            <p class="prediction-text">{{ prediction_text }}</p>
        </div>
        {% endif %}

    </div>

</body>

</html>
